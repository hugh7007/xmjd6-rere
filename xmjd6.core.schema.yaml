# Rime schema settings
# encoding: utf-8

schema:
  schema_id: xmjd6.core
  name: 星猫键道630提示辅助方案·勿选
  version: "2026年5月9日"
  author:
    - 浮生 <wzxmer@outlook.com>
  description: |
    仅用于部署 xmjd6.core 小词典，供 630 提示 ReverseLookup 使用。

engine:
  processors:
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"

translator:
  dictionary: xmjd6.core
  db_class: tabledb
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false

key_binder:
  import_preset: default
