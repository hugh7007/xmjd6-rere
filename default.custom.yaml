patch:
  #方案选单相关
  switcher:
    caption: 「方案选单」
    hotkeys:
      - F4
      - "Control+grave"
      - "Control+Shift+grave"
    save_options:  # 开关记忆（方案中的 switches），从方案选单（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
      - full_shape
      - jffh
      - mars
      - emoji_cn
      - completion
    fold_options: false            # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
    abbreviate_options: true      # 折叠时是否缩写选项
    option_list_separator: ' / '  # 折叠时的选项分隔符
  schema_list:
    - schema: xmjd6
